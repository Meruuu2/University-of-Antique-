<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UA FMS — Access</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f4;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #111;
    }
    .login-container {
      background: #fff;
      padding: 32px 28px;
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 360px;
      text-align: left;
      border: 1px solid #ddd;
    }
    .app-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; letter-spacing: 0.03em; }
    .app-subtitle {
      font-size: 12px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 18px;
    }
    .role-badge {
      display: inline-block; border: 1px solid #111; color: #111;
      padding: 4px 10px; border-radius: 999px; font-size: 11px; font-weight: 500;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 24px;
    }
    label { display: block; font-size: 12px; margin-bottom: 6px; color: #333; }
    input[type="password"] {
      width: 100%; padding: 10px 12px; border: 1px solid #b0b0b0; border-radius: 4px;
      font-size: 14px; margin-bottom: 14px; background: #fafafa;
    }
    input[type="password"]:focus {
      outline: none; border-color: #111; box-shadow: 0 0 0 1px #111; background: #fff;
    }
    button {
      width: 100%; padding: 10px; background: #111; color: #fff; border: none;
      border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer;
    }
    button:hover { background: #222; }
    button:active { transform: translateY(1px); }
    .error { color: #b00020; font-size: 12px; margin-top: 8px; display: none; }
    .footer {
      margin-top: 18px; color: #777; font-size: 11px; border-top: 1px solid #eee; padding-top: 10px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="app-title">University of Antique</div>
    <div class="app-subtitle">Facility &amp; Equipment Management</div>
    <div class="role-badge" id="roleBadge">Portal</div>
    <label for="keyInput">Access key</label>
    <input type="password" id="keyInput" placeholder="Enter key" autofocus />
    <button type="button" id="btn">Continue</button>
    <div class="error" id="errorMsg">Access denied. Invalid key.</div>
    <div class="footer">Authorized personnel only</div>
  </div>
  <script>
    const api = window.launcher;
    if (!api) {
      document.body.innerHTML = '<p style="padding:24px">Launcher API unavailable.</p>';
    } else {
      api.getMeta().then((m) => {
        document.getElementById('roleBadge').textContent = m.badge;
      }).catch(() => {});

      async function go() {
        const key = document.getElementById('keyInput').value;
        const err = document.getElementById('errorMsg');
        err.style.display = 'none';
        try {
          const r = await api.validateAndOpen(key);
          if (!r.ok) {
            err.style.display = 'block';
            document.getElementById('keyInput').value = '';
            document.getElementById('keyInput').focus();
          }
        } catch (e) {
          err.textContent = 'Could not reach launcher. Try again.';
          err.style.display = 'block';
        }
      }

      document.getElementById('btn').addEventListener('click', go);
      document.getElementById('keyInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); go(); }
      });
    }
  </script>
</body>
</html>
